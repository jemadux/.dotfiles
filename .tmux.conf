# ============================================================
#  Flexoki Dark — tmux configuration
#  https://stephango.com/flexoki
# ============================================================

# Flexoki Dark palette
# bg       #100f0f
# bg-2     #1c1b1a
# bg+      #282726
# ui       #343331
# ui+      #403e3c
# tx-3     #575653
# tx-2     #878580
# tx       #cecdc3
# re       #af3029
# or       #bc5215
# ye       #ad8301
# gr       #66800b
# cy       #24837b
# bl       #205ea6
# pu       #5e409d
# ma       #a02f6f

# ============================================================
#  General
# ============================================================

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on
set -g set-clipboard on

# ============================================================
#  Status bar
# ============================================================

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

# Status bar background / foreground
set -g status-style "bg=#1c1b1a,fg=#878580"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#205ea6,fg=#cecdc3,bold] #S #[bg=#1c1b1a,fg=#205ea6]"

# Right: host · date · time
set -g status-right-length 80
set -g status-right "#[fg=#575653]#[bg=#282726,fg=#878580] %a %d %b #[bg=#343331,fg=#cecdc3] %H:%M #[bg=#205ea6,fg=#cecdc3,bold] #h "

# ============================================================
#  Window tabs
# ============================================================

# Inactive window
set -g window-status-format " #[fg=#575653]#I#[fg=#403e3c]:#[fg=#878580]#W#[fg=#575653]#{?window_zoomed_flag, Z,} "
set -g window-status-separator ""

# Active window
set -g window-status-current-format "#[bg=#282726,fg=#1c1b1a]#[bg=#282726,fg=#cecdc3,bold] #I#[fg=#878580]:#[fg=#cecdc3]#W#[fg=#66800b]#{?window_zoomed_flag, Z,} #[bg=#1c1b1a,fg=#282726]"

# Window with activity
set -g window-status-activity-style "bg=#1c1b1a,fg=#ad8301"
set -g window-status-bell-style    "bg=#1c1b1a,fg=#af3029,bold"

# ============================================================
#  Pane borders
# ============================================================

set -g pane-border-style        "fg=#343331"
set -g pane-active-border-style "fg=#205ea6"

# ============================================================
#  Pane number display (prefix-q)
# ============================================================

set -g display-panes-colour        "#575653"
set -g display-panes-active-colour "#205ea6"
set -g display-panes-time 1500

# ============================================================
#  Messages
# ============================================================

set -g message-style         "bg=#282726,fg=#cecdc3"
set -g message-command-style "bg=#282726,fg=#66800b"

# ============================================================
#  Mode (copy mode, search)
# ============================================================

set -g mode-style "bg=#205ea6,fg=#cecdc3"

# ============================================================
#  Clock mode
# ============================================================

set -g clock-mode-colour "#205ea6"
set -g clock-mode-style  24

# ============================================================
#  Key bindings
# ============================================================

# Change prefix to Ctrl-a (optional — comment out to keep Ctrl-b)
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Intuitive splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Toggle zoom
bind z resize-pane -Z

# Move between windows
bind -r p previous-window
bind -r n next-window

# Copy mode (vi keys)
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ============================================================
#  End of Flexoki Dark tmux config
# ============================================================
